<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAYA_LOK | Encrypted Vault</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');

    :root {
      --blue:      #3b82f6;
      --blue-dim:  #1d4ed8;
      --blue-glow: rgba(59,130,246,0.15);
      --cyan:      #22d3ee;
      --green:     #4ade80;
      --red:       #f87171;
      --amber:     #fbbf24;
      --bg:        #010409;
      --bg2:       #0d1117;
      --bg3:       #161b22;
      --bg4:       #21262d;
      --border:    #30363d;
      --text:      #e6edf3;
      --text-dim:  #7d8590;
      --text-muted:#484f58;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background and Grid */
    .vault-bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #0d1f3c 0%, transparent 60%), radial-gradient(ellipse 40% 40% at 10% 80%, #0a1628 0%, transparent 50%), var(--bg);
    }
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(to right, #21262d44 1px, transparent 1px), linear-gradient(to bottom, #21262d44 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Layout Frames */
    .frame { 
      border: 1px solid var(--border); 
      background: rgba(13,17,23,0.92); 
      backdrop-filter: blur(16px); 
      position: relative; 
    }
    .frame::before { 
      content: ''; 
      position: absolute; 
      top: -1px; left: -1px; 
      width: 22px; height: 22px; 
      border-top: 2px solid var(--blue); 
      border-left: 2px solid var(--blue); 
    }
    .frame::after { 
      content: ''; 
      position: absolute; 
      bottom: -1px; right: -1px; 
      width: 22px; height: 22px; 
      border-bottom: 2px solid var(--blue); 
      border-right: 2px solid var(--blue); 
    }

    /* Inputs and Buttons */
    .vault-input { 
      width: 100%; 
      padding: 0.875rem 1rem; 
      background: rgba(0,0,0,0.4); 
      border: 1px solid var(--border); 
      color: var(--blue); 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 0.8rem; 
      outline: none; 
      transition: all 0.2s;
    }
    .vault-input:focus { 
      border-color: var(--blue); 
      box-shadow: 0 0 10px rgba(59,130,246,0.3);
    }

    .btn-primary { 
      width: 100%; 
      padding: 0.875rem; 
      background: rgba(59,130,246,0.1); 
      border: 1px solid var(--blue-dim); 
      color: var(--blue); 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 0.7rem; 
      font-weight: 500; 
      letter-spacing: 0.4em; 
      text-transform: uppercase; 
      cursor: pointer; 
      transition: all 0.2s;
    }
    .btn-primary:hover { 
      background: rgba(59,130,246,0.2); 
      box-shadow: 0 0 15px rgba(59,130,246,0.4);
    }

    .btn-ghost { 
      padding: 0.4rem 0.85rem; 
      background: transparent; 
      border: 1px solid var(--border); 
      color: var(--text-dim); 
      font-size: 0.65rem; 
      letter-spacing: 0.2em; 
      cursor: pointer; 
      text-transform: uppercase; 
      transition: all 0.2s;
    }
    .btn-ghost:hover { 
      color: var(--blue); 
      border-color: var(--blue);
    }
    .btn-ghost.danger:hover { 
      color: var(--red); 
      border-color: var(--red); 
    }

    /* Login Section */
    #login-section { 
      position: relative; 
      z-index: 1; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      padding: 2rem;
    }
    .login-card { 
      width: 100%; 
      max-width: 420px; 
      padding: 3rem 2.5rem; 
      text-align: center; 
    }
    .vault-title { 
      font-family: 'Orbitron', sans-serif; 
      font-size: 1.5rem; 
      color: var(--blue); 
      letter-spacing: 0.3em; 
      margin-bottom: 2rem; 
    }

    /* Dashboard Section */
    #dashboard-section { 
      display: none; 
      position: relative; 
      z-index: 1; 
      min-height: 100vh; 
    }
    
    /* Auth Section */
    #auth-section {
      position: relative;
      z-index: 1;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      display: none;
    }
    
    .dash-header { 
      border-bottom: 1px solid var(--border); 
      padding: 1.25rem 2rem; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      background: rgba(1,4,9,0.9); 
    }
    .dash-body { 
      max-width: 1100px; 
      margin: 0 auto; 
      padding: 2rem; 
    }
    .upload-zone { 
      border: 1px dashed var(--border); 
      background: rgba(13,17,23,0.5); 
      padding: 2.5rem; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.2s;
    }
    .upload-zone:hover { 
      border-color: var(--blue); 
      background: rgba(59,130,246,0.05);
    }

    /* Files Table */
    .files-table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 1rem; 
    }
    .files-table th { 
      font-size: 9px; 
      color: var(--text-dim); 
      padding: 0.6rem 1rem; 
      border-bottom: 1px solid var(--border); 
      text-align: left; 
      font-weight: 500;
      letter-spacing: 0.1em;
    }
    .files-table td { 
      padding: 0.85rem 1rem; 
      border-bottom: 1px solid var(--bg3); 
      font-size: 0.78rem; 
    }
    
    .status-pill { 
      display: inline-flex; 
      align-items: center; 
      gap: 6px; 
      font-size: 9px; 
      padding: 3px 10px; 
      text-transform: uppercase; 
      border-radius: 2px; 
    }
    .pill-error { 
      background: rgba(248,113,113,0.08); 
      color: var(--red); 
      border: 1px solid #7f1d1d; 
    }
    .pill-success { 
      background: rgba(74,222,128,0.08); 
      color: var(--green); 
      border: 1px solid #166534; 
    }
    .pill-info { 
      background: rgba(59,130,246,0.08); 
      color: var(--blue); 
      border: 1px solid #1d4ed8; 
    }

    /* Toast */
    #toast { 
      position: fixed; 
      bottom: 2rem; 
      right: 2rem; 
      z-index: 999; 
      padding: 0.75rem 1.25rem; 
      font-size: 0.72rem; 
      border: 1px solid var(--border); 
      background: var(--bg2); 
      opacity: 0; 
      transition: 0.3s; 
      pointer-events: none; 
    }
    #toast.show { 
      opacity: 1; 
      transform: translateY(-10px); 
    }

    /* File Input Styling */
    #file-input { display: none; }

    /* Modal */
    #uploadModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 2rem;
    }
    #uploadModal.show {
      display: flex;
    }
    .modal-content {
      width: 100%;
      max-width: 500px;
      padding: 2rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      color: var(--blue);
      letter-spacing: 0.2em;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="vault-bg"></div>
  <div class="grid-overlay"></div>

  <section id="login-section">
    <div class="frame login-card">
      <div class="vault-title">MAYA_LOK</div>
      <p style="font-size: 9px; color: var(--text-muted); letter-spacing: 0.2em; margin-bottom: 2rem;">ENCRYPTED_FILE_VAULT</p>
      <div style="display:flex;flex-direction:column;gap:0.75rem;">
        <input type="text" id="username" class="vault-input" placeholder="USER_ID" value="admin">
        <input type="password" id="loginPassword" class="vault-input" placeholder="CIPHER_KEY" value="admin">
        <button class="btn-primary" id="loginBtn">INITIATE_SESSION</button>
      </div>
      <div id="login-error" style="display:none; margin-top:1rem;">
        <span class="status-pill pill-error" id="login-error-text">INVALID_CREDENTIALS</span>
      </div>
    </div>
  </section>

  <section id="auth-section">
    <div style="text-align:center;">
      <p style="font-size:10px;color:var(--text-muted);letter-spacing:0.2em;margin-bottom:1rem;">BIOMETRIC_HANDSHAKE_REQUIRED</p>
      <div class="frame" style="padding:2rem 3rem;">
        <div style="font-family: 'Orbitron', sans-serif; font-size: 3.5rem; color: var(--text); letter-spacing: 0.3em;" id="display-code">--------</div>
      </div>
      <p style="font-size:9px;color:var(--blue);margin-top:2rem;">APPROVAL_REQUIRED_OR_ENTER_CODE_MANUALLY</p>
      <div style="margin-top: 2rem; max-width: 400px;">
        <input type="text" id="auth-code-input" maxlength="8" class="vault-input" placeholder="AUTH_CODE" style="text-align: center;">
      </div>
    </div>
    <div style="display: flex; gap: 1rem;">
      <button class="btn-ghost" id="auth-approve-btn" onclick="approveAuth()">[ APPROVE ]</button>
      <button class="btn-primary" id="auth-initiate-btn" onclick="handleAuthCode()" style="width: auto;">VERIFY_CODE</button>
      <button class="btn-ghost danger" id="auth-cancel-btn" onclick="cancelAuth()">[ CANCEL ]</button>
    </div>
  </section>

  <section id="dashboard-section">
    <div class="dash-header">
      <div style="font-family:'Orbitron'; color:var(--blue); font-size: 0.9rem; letter-spacing: 0.2em;">MAYA_LOK // <span id="user-label" style="color:white;"></span></div>
      <button class="btn-ghost danger" id="logoutBtn">[ TERMINATE ]</button>
    </div>
    <div class="dash-body">
      <div class="section-title">📁 VAULT_STORAGE</div>
      <div class="frame" style="padding: 2rem; margin-bottom: 2rem;">
        <div class="upload-zone" onclick="document.getElementById('file-input').click()">
          <input type="file" id="file-input" multiple>
          <p style="font-size: 0.85rem; letter-spacing: 0.1em;">[ DRAG & DROP OR CLICK TO ENCRYPT_FILES ]</p>
        </div>
      </div>

      <div id="empty-state" class="frame empty-state">VAULT_EMPTY</div>
      
      <table class="files-table" id="files-table" style="display:none;">
        <thead>
          <tr>
            <th>FILENAME</th>
            <th>SIZE</th>
            <th style="text-align:right;">ACTIONS</th>
          </tr>
        </thead>
        <tbody id="files-tbody"></tbody>
      </table>

      <div style="margin-top: 2rem;">
        <div class="section-title">⚙️ VAULT_OPERATIONS</div>
        <div class="frame" style="padding: 1.5rem;">
          <button class="btn-ghost danger" id="clearBtn" style="width: 100%;">[ CLEAR_VAULT ]</button>
        </div>
      </div>
    </div>
  </section>

  <div id="uploadModal">
    <div class="frame modal-content">
      <div class="section-title" style="margin-bottom: 1.5rem;">ENCRYPT_FILE</div>
      <div id="modalMessage" class="min-h-[2rem] text-sm font-medium margin-bottom: 1rem;"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
